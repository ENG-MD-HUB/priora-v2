<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="./icon-512.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#010409" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="description" content="Priora — Track Everything. Forget Nothing." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Priora" />
  <link rel="apple-touch-icon" href="./icon-512.png" />
  <title>Priora</title>
  <script>
    // لو الرابط من Vercel → فتح التطبيق
    // لو من أي مكان ثاني → redirect
    if (window.location.hostname === 'priora.vercel.app') {
      // Vercel: حمّل التطبيق
      var s = document.createElement('script');
      s.type = 'module';
      s.crossOrigin = '';
      s.src = './assets/index-CihlIB0M.js';
      document.head.appendChild(s);

      var css = document.createElement('link');
      css.rel = 'stylesheet';
      css.crossOrigin = '';
      css.href = './assets/index-BwMv6kYj.css';
      document.head.appendChild(css);
    } else {
      // GitHub أو أي رابط ثاني: redirect
      document.title = 'Priora — Redirecting...';
      document.head.innerHTML += `<style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#010409;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .c{text-align:center;padding:40px 24px;max-width:480px}
        .logo{font-size:32px;font-weight:700;color:#fff;margin-bottom:8px}
        .dot{display:inline-block;width:10px;height:10px;background:#3b82f6;border-radius:50%;margin-right:6px;vertical-align:middle}
        .msg{font-size:16px;color:#8b949e;margin-bottom:32px;line-height:1.6}
        .msg strong{color:#e6edf3}
        .btn{display:inline-block;padding:12px 28px;background:#3b82f6;color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600}
        .cd{margin-top:20px;font-size:13px;color:#484f58}
        .bw{width:200px;height:3px;background:#21262d;border-radius:99px;margin:16px auto 0;overflow:hidden}
        .b{height:100%;background:#3b82f6;border-radius:99px;animation:fill 8s linear forwards}
        @keyframes fill{from{width:0%}to{width:100%}}
      </style>`;
      document.body.innerHTML = `
        <div class="c">
          <div class="logo"><span class="dot"></span>Priora</div>
          <p class="msg">We've moved!<br/><strong>Priora</strong> has a new home.</p>
          <a class="btn" href="https://priora.vercel.app/">Go to New Site →</a>
          <p class="cd">Redirecting automatically in 8 seconds…</p>
          <div class="bw"><div class="b"></div></div>
        </div>`;
      setTimeout(() => window.location.href = 'https://priora.vercel.app/', 8000);
    }
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
